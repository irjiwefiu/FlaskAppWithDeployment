name: Deploy Docker Image to EC2 interface

on:
  push:
    branches: [main]

jobs:
  continous-integration:
    runs-on: ubuntu-latest
    outputs:
      registry_image: ${{ steps.build-image.outputs.image_path }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v2
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_DEFAULT_REGION }}

      - name: Login to Amazon ECR
        id: ecr-login
        uses: aws-actions/amazon-ecr-login@v1

      - name: Build, tag and push image to Amazon ECR
        id: build-image
        run: |
          # Use variables directly to ensure no empty tags
          REGISTRY=${{ steps.ecr-login.outputs.registry }}
          REPO=${{ secrets.ECR_REPOSITORY }}
          TAG="latest"
          FULL_NAME="$REGISTRY/$REPO:$TAG"

          echo "Building $FULL_NAME..."
          docker build -t $FULL_NAME .

          echo "Pushing $FULL_NAME..."
          docker push $FULL_NAME

          # Force the output to ensure the next job sees it
          echo "image_path=$FULL_NAME" >> $GITHUB_OUTPUT

  continous-deployment:
    needs: continous-integration
    runs-on: self-hosted
    steps:
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v2
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_DEFAULT_REGION }}

      - name: Login to Amazon ECR
        uses: aws-actions/amazon-ecr-login@v1

      - name: Deploy to Docker
        env:
          # Use the job output from CI
          DEPLOY_IMAGE: ${{ needs.continous-integration.outputs.registry_image }}
        run: |
          # If the variable is still empty, we fallback to a manual construction
          # Replace 'your-repo-name' and 'your-account-id' if this fails
          IMAGE_TO_PULL=${DEPLOY_IMAGE}

          echo "Attempting to pull: $IMAGE_TO_PULL"
          docker pull $IMAGE_TO_PULL

          docker stop my-app-container || true
          docker rm my-app-container || true

          docker run -d \
            --name my-app-container \
            -p 5000:5000 \
            -e AWS_ACCESS_KEY_ID=${{ secrets.AWS_ACCESS_KEY_ID }} \
            -e AWS_SECRET_ACCESS_KEY=${{ secrets.AWS_SECRET_ACCESS_KEY }} \
            -e AWS_DEFAULT_REGION=${{ secrets.AWS_DEFAULT_REGION }} \
            $IMAGE_TO_PULL
