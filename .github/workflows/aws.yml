name: Deploy Docker Image to EC2 interface

on:
  push:
    branches: [main]

jobs:
  continous-integration:
    runs-on: ubuntu-latest
    # CRITICAL: This must be exactly here to bridge Job 1 and Job 2
    outputs:
      image_tag: ${{ steps.build-image.outputs.full_path }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v2
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_DEFAULT_REGION }}

      - name: Login to Amazon ECR
        id: ecr-login
        uses: aws-actions/amazon-ecr-login@v1

      - name: Build, tag and push image to Amazon ECR
        id: build-image
        run: |
          # 1. Define variables clearly
          REGISTRY="${{ steps.ecr-login.outputs.registry }}"
          REPO="${{ secrets.ECR_REPOSITORY }}"
          TAG="latest"
          FULL_PATH="$REGISTRY/$REPO:$TAG"

          # 2. Build and Tag (Ensures the image isn't '-' in ECR)
          docker build -t $FULL_PATH .

          # 3. Push
          docker push $FULL_PATH

          # 4. EXPORT TO GITHUB_OUTPUT (The most important line)
          echo "full_path=$FULL_PATH" >> "$GITHUB_OUTPUT"

  continous-deployment:
    needs: continous-integration
    runs-on: self-hosted
    steps:
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v2
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_DEFAULT_REGION }}

      - name: Login to Amazon ECR
        id: ecr-login
        uses: aws-actions/amazon-ecr-login@v1

      - name: Deploy to Docker
        run: |
          # 1. Try to get the path from the previous job
          IMAGE_PATH="${{ needs.continous-integration.outputs.image_tag }}"

          # 2. EMERGENCY FALLBACK: If the variable is empty, reconstruct it manually
          if [ -z "$IMAGE_PATH" ]; then
            echo "Variable handoff failed. Reconstructing manually..."
            REGISTRY="${{ steps.ecr-login.outputs.registry }}"
            REPO="${{ secrets.ECR_REPOSITORY }}"
            IMAGE_PATH="$REGISTRY/$REPO:latest"
          fi

          echo "Final Image Path: $IMAGE_PATH"

          # 3. Pull and Run
          docker pull $IMAGE_PATH
          docker stop my-app-container || true
          docker rm my-app-container || true
          docker run -d \
            --name my-app-container \
            -p 5000:5000 \
            -e AWS_ACCESS_KEY_ID=${{ secrets.AWS_ACCESS_KEY_ID }} \
            -e AWS_SECRET_ACCESS_KEY=${{ secrets.AWS_SECRET_ACCESS_KEY }} \
            -e AWS_DEFAULT_REGION=${{ secrets.AWS_DEFAULT_REGION }} \
            $IMAGE_PATH
