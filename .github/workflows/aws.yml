name: Deploy Docker Image to EC2 interface

on:
  push:
    branches: [main]

jobs:
  continous-integration:
    runs-on: ubuntu-latest
    # This must be perfectly aligned with 'steps'
    outputs:
      registry_image: ${{ steps.build-image.outputs.image_path }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v2
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_DEFAULT_REGION }}

      - name: Login to Amazon ECR
        id: ecr-login
        uses: aws-actions/amazon-ecr-login@v1

      - name: Build, tag and push image to Amazon ECR
        id: build-image
        env:
          ECR_REGISTRY: ${{ steps.ecr-login.outputs.registry }}
          ECR_REPOSITORY: ${{ secrets.ECR_REPOSITORY }}
          IMAGE_TAG: latest
        run: |
          FULL_NAME=$ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG
          docker build -t $FULL_NAME .
          docker push $FULL_NAME

          # This line "exports" the variable to the job output
          echo "image_path=$FULL_NAME" >> $GITHUB_OUTPUT

  continous-deployment:
    needs: continous-integration
    runs-on: self-hosted
    steps:
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v2
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_DEFAULT_REGION }}

      - name: Login to Amazon ECR
        uses: aws-actions/amazon-ecr-login@v1

      - name: Deploy to Docker
        # We access the output directly from the 'needs' context here
        env:
          DEPLOY_IMAGE: ${{ needs.continous-integration.outputs.registry_image }}
        run: |
          if [ -z "$DEPLOY_IMAGE" ]; then
            echo "CRITICAL ERROR: DEPLOY_IMAGE is still empty. Check CI job logs."
            exit 1
          fi
          docker pull $DEPLOY_IMAGE
          docker stop my-app-container || true
          docker rm my-app-container || true
          docker run -d \
            --name my-app-container \
            -p 5000:5000 \
            -e AWS_ACCESS_KEY_ID=${{ secrets.AWS_ACCESS_KEY_ID }} \
            -e AWS_SECRET_ACCESS_KEY=${{ secrets.AWS_SECRET_ACCESS_KEY }} \
            -e AWS_DEFAULT_REGION=${{ secrets.AWS_DEFAULT_REGION }} \
            $DEPLOY_IMAGE
